<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxygen Powerplay Arena | 24/7 Sports Turf Bengaluru</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <link rel="stylesheet" href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css)">
    <style>
        @import url('[https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap](https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap)');
        :root { --primary-oxygen: #00ff88; --deep-space: #0a0e14; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--deep-space); color: white; }
        .oxygen-text { color: var(--primary-oxygen); font-family: 'Orbitron', sans-serif; }
        .hero-gradient { background: linear-gradient(rgba(10,14,20,0.8), rgba(10,14,20,0.98)), url('[https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=1920&q=80](https://images.unsplash.com/photo-1574629810360-7efbbe195018?auto=format&fit=crop&w=1920&q=80)'); background-size: cover; }
        .glass-card { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        .form-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 10px; width: 100%; outline: none; }
        .form-input:focus { border-color: var(--primary-oxygen); }
        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 1000; overflow-y: auto; padding: 2rem; }
    </style>
</head>
<body>

    <div id="admin-panel">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black oxygen-text">BOOKING LOGS</h2>
                <button onclick="document.getElementById('admin-panel').style.display='none'" class="text-white text-2xl">&times;</button>
            </div>
            <div class="glass-card overflow-hidden">
                <table class="w-full text-left text-xs">
                    <thead class="bg-white/10 uppercase">
                        <tr>
                            <th class="p-4">Date</th>
                            <th class="p-4">Slot</th>
                            <th class="p-4">Captain</th>
                            <th class="p-4">Phone</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>

    <header class="hero-gradient min-h-[60vh] flex flex-col items-center justify-center text-center px-4">
        <h1 class="text-6xl md:text-8xl font-black mb-4 tracking-tighter uppercase italic">OXYGEN <span class="oxygen-text">ARENA</span></h1>
        <p class="text-gray-400 text-sm uppercase tracking-widest mb-8">Kaval Bairasandra, Bengaluru | 24/7 Open</p>
        <a href="#booking" class="bg-[#00ff88] text-black px-10 py-4 rounded-full font-black uppercase text-xs">Book Slot Now</a>
    </header>

    <section id="booking" class="py-20 px-6">
        <div class="max-w-xl mx-auto glass-card p-8 md:p-12">
            <h2 class="text-3xl font-black oxygen-text text-center mb-8 italic">RESERVE TURF</h2>
            <form id="bookingForm" class="space-y-4">
                <input type="text" id="captain_name" required class="form-input" placeholder="Team Captain Name">
                <input type="tel" id="whatsapp_no" required class="form-input" placeholder="WhatsApp Number" pattern="[0-9]{10}">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="booking_date" required class="form-input">
                    <select id="booking_time" required class="form-input">
                        <option value="" disabled selected>Select Time</option>
                        <option value="17:00">05:00 PM</option>
                        <option value="18:00">06:00 PM</option>
                        <option value="19:00">07:00 PM</option>
                        <option value="20:00">08:00 PM</option>
                        <option value="21:00">09:00 PM</option>
                        <option value="22:00">10:00 PM</option>
                    </select>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-[#00ff88] text-black font-black py-5 rounded-xl uppercase text-sm mt-4">Confirm via WhatsApp</button>
            </form>
        </div>
    </section>

    <footer class="py-10 text-center border-t border-white/5">
        <button onclick="document.getElementById('admin-panel').style.display='block'" class="text-[10px] text-gray-700 uppercase tracking-widest hover:text-white">Admin Dashboard</button>
    </footer>

    <script type="module">
        import { initializeApp } from "[https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js](https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js)";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "[https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js](https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js)";
        import { getFirestore, collection, addDoc, serverTimestamp, onSnapshot, query } from "[https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js](https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js)";

        const firebaseConfig = {
            apiKey: "AIzaSyAkgqxMU-2duaDIZesbv26sWp4UzcAKNCI",
            authDomain: "oxygen-arena-portal.firebaseapp.com",
            projectId: "oxygen-arena-portal",
            storageBucket: "oxygen-arena-portal.firebasestorage.app",
            messagingSenderId: "602115838449",
            appId: "1:602115838449:web:6528f5ea3df0a56444f450"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'oxygen-powerplay-2026';

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const leadsRef = collection(db, 'artifacts', appId, 'public', 'data', 'leads');
                onSnapshot(query(leadsRef), (snap) => {
                    const tbody = document.getElementById('admin-table-body');
                    if(!tbody) return;
                    tbody.innerHTML = '';
                    snap.docs.forEach(doc => {
                        const d = doc.data();
                        tbody.innerHTML += `<tr><td class="p-4">${d.date}</td><td class="p-4 text-[#00ff88]">${d.time}</td><td class="p-4">${d.captain}</td><td class="p-4">${d.phone}</td></tr>`;
                    });
                });
            } else {
                signInAnonymously(auth);
            }
        });

        document.getElementById('bookingForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const data = {
                captain: document.getElementById('captain_name').value,
                phone: document.getElementById('whatsapp_no').value,
                date: document.getElementById('booking_date').value,
                time: document.getElementById('booking_time').value,
                timestamp: serverTimestamp()
            };
            btn.disabled = true;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'leads'), data);
                const msg = `OXYGEN ARENA BOOKING:\nCaptain: ${data.captain}\nDate: ${data.date}\nSlot: ${data.time}`;
                window.open(`https://wa.me/918618038563?text=${encodeURIComponent(msg)}`, '_blank');
            } finally { btn.disabled = false; }
        };
    </script>
</body>
</html>
